# Reference nginx snippet for the production reverse proxy in front of
# Argus. The TLS cert + listener setup is intentionally omitted
# because the deployment target (argus.example.com) is expected to already
# have those in place — only the `location` block needs to point at this
# upstream.
#
# Key points:
#   * SSE endpoint (/api/events/stream) needs proxy_buffering off + a long
#     read timeout so live events aren't coalesced on nginx's side.
#   * The ?token= query param used by EventSource is scrubbed from access
#     logs; the backend already redacts it in application logs as a belt-
#     and-braces safety net.

upstream argus {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    # listener + certificates managed elsewhere (server_name argus.example.com; listen 443 ssl; ...)

    # Main site
    location / {
        proxy_pass http://argus;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection        "";
    }

    # SSE live stream: keep it open
    location /api/events/stream {
        proxy_pass http://argus;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection        "";

        proxy_buffering       off;
        proxy_cache           off;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        chunked_transfer_encoding on;

        # Strip ?token=... from the logged request so JWTs don't leak.
        set $scrub_args $args;
        if ($scrub_args ~ (.*)(^|&)token=[^&]*(.*)) {
            set $scrub_args $1$2$3;
        }
        access_log /var/log/nginx/argus.log combined;
    }
}
