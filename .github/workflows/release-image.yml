name: release-image

on:
  push:
    tags:
      - 'monitor-v*'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build + push container to ghcr.io
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Derive image tag from git tag
        id: meta
        shell: bash
        run: |
          # Strip the `monitor-v` prefix so the image tag is just the version
          # (e.g. tag `monitor-v0.4.0` → image tag `0.4.0`).
          ref="${GITHUB_REF##*/}"
          version="${ref#monitor-v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/argus" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
