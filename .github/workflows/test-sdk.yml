name: test-sdk

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/test-sdk.yml'
  pull_request:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/test-sdk.yml'

concurrency:
  group: test-sdk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: client/pyproject.toml

      - name: Install SDK with dev extras
        working-directory: client
        run: pip install -e ".[dev]"

      - name: pytest
        working-directory: client
        run: pytest
