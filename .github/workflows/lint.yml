name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python formatting + style. Black --check fails on any unformatted file;
  # ruff handles import order, unused imports, and other lints. Both run on
  # backend/ and client/ in a single job so failures surface together.
  # ---------------------------------------------------------------------------
  python:
    name: black + ruff (backend, client)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install linters
        run: pip install black ruff

      - name: black --check (backend, client)
        run: black --check backend client

      - name: ruff (backend, client)
        run: ruff check backend client

  # ---------------------------------------------------------------------------
  # Selective mypy strict. We deliberately scope to the public-facing
  # surfaces (api/ + reporter/) so contributors aren't blocked by strict
  # checks on internal helper modules. Broaden as type coverage matures.
  # ---------------------------------------------------------------------------
  mypy:
    name: mypy --strict (api + reporter)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend with dev extras
        working-directory: backend
        run: pip install -e ".[dev]"

      - name: Install client with dev extras
        working-directory: client
        run: pip install -e ".[dev]"

      - name: Install mypy
        run: pip install mypy

      - name: mypy --strict backend/backend/api
        working-directory: backend
        run: mypy --strict backend/api


  # ---------------------------------------------------------------------------
  # Frontend formatting via Prettier. We don't enforce eslint here because
  # the repo doesn't ship a unified eslint config yet (vue-tsc is in
  # test-frontend.yml). Add eslint once tooling lands.
  # ---------------------------------------------------------------------------
  prettier:
    name: prettier --check (frontend/src)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Install prettier
        run: pnpm add -g prettier@3

      - name: prettier --check frontend/src
        run: prettier --check 'frontend/src/**/*.{ts,tsx,vue,js,jsx,json,css,scss,md}'

  # ---------------------------------------------------------------------------
  # i18n parity gate. The script lives at frontend/scripts/i18n_lint.py and
  # is also invoked from the i18n.yml workflow, but we re-run it here so
  # `lint` is a single required check on PRs.
  # ---------------------------------------------------------------------------
  i18n-parity:
    name: i18n key parity
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run i18n parity lint
        run: python frontend/scripts/i18n_lint.py
