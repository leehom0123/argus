<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>验证您的邮箱</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; max-width: 560px; margin: 40px auto; color: #222;">
  <h1 style="font-size: 20px;">欢迎，{{ username }}</h1>
  <p>
    感谢您注册 Argus。请点击下方链接验证您的邮箱，完成账户创建：
  </p>
  <p>
    <a href="{{ verify_url }}"
       style="display: inline-block; padding: 10px 18px; background: #1677ff; color: white; text-decoration: none; border-radius: 4px;">
      验证邮箱
    </a>
  </p>
  <p style="color: #666; font-size: 13px;">
    或将以下链接复制到浏览器中打开：<br>
    <code style="word-break: break-all;">{{ verify_url }}</code>
  </p>
  <p style="color: #666; font-size: 13px;">
    此链接将在 {{ ttl_hours }} 小时后失效。如果您未创建此账户，请忽略本邮件。
  </p>
  <hr style="border: none; border-top: 1px solid #eee; margin: 32px 0;">
  <p style="color: #999; font-size: 12px;">
    Argus &middot; {{ base_url }}
  </p>
</body>
</html>
