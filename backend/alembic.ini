[alembic]
# Path (relative to alembic.ini) holding the versions directory.
script_location = migrations

# Timezone for migration version stamps; ISO-utc keeps output deterministic.
timezone = UTC

# Appended to sys.path so ``from backend import ...`` works inside env.py.
prepend_sys_path = .

# Template used to generate migration files. The default one with optional
# slug suffix makes for readable filenames.
file_template = %%(rev)s_%%(slug)s

# Database URL is supplied at runtime by env.py (reads ARGUS_DB_URL / env).
# Leaving sqlalchemy.url unset prevents a stale URL here from overriding it.
sqlalchemy.url =


[post_write_hooks]
# No auto-formatter hook; keep migrations as-written for auditability.


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
